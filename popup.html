<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude 中文介面</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 220px;
      font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif;
      background: #1a1a1a;
      color: #f0f0f0;
    }

    .header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid #333;
    }

    .header h1 {
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      letter-spacing: 0.02em;
    }

    .header p {
      font-size: 10px;
      color: #888;
      margin-top: 2px;
    }

    .section {
      padding: 12px 16px;
    }

    .label {
      font-size: 10px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .lang-buttons {
      display: flex;
      gap: 6px;
    }

    .lang-btn {
      flex: 1;
      padding: 7px 0;
      border: 1px solid #444;
      border-radius: 6px;
      background: transparent;
      color: #ccc;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }

    .lang-btn:hover {
      border-color: #888;
      color: #fff;
    }

    .lang-btn.active {
      background: #d97706;
      border-color: #d97706;
      color: #fff;
      font-weight: 600;
    }

    .divider {
      height: 1px;
      background: #2a2a2a;
      margin: 0 16px;
    }

    .toggle-row {
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .toggle-label {
      font-size: 12px;
      color: #ccc;
    }

    /* Toggle switch */
    .switch {
      position: relative;
      width: 36px;
      height: 20px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      inset: 0;
      background: #444;
      border-radius: 20px;
      cursor: pointer;
      transition: 0.2s;
    }

    .slider::before {
      content: "";
      position: absolute;
      width: 14px;
      height: 14px;
      left: 3px;
      top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: 0.2s;
    }

    input:checked + .slider {
      background: #d97706;
    }

    input:checked + .slider::before {
      transform: translateX(16px);
    }

    .footer {
      padding: 8px 16px 12px;
      font-size: 10px;
      color: #555;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>Claude 中文介面</h1>
    <p>僅翻譯介面，不影響對話</p>
  </div>

  <div class="section">
    <div class="label">語言選擇</div>
    <div class="lang-buttons">
      <button class="lang-btn" id="btn-tw">繁體</button>
      <button class="lang-btn" id="btn-cn">简体</button>
    </div>
  </div>

  <div class="divider"></div>

  <div class="toggle-row">
    <span class="toggle-label">啟用中文介面</span>
    <label class="switch">
      <input type="checkbox" id="toggle-enabled" checked>
      <span class="slider"></span>
    </label>
  </div>

  <div class="footer">作用範圍：左側導覽 &amp; 系統按鈕</div>

  <script src="popup.js"></script>
</body>
</html>
